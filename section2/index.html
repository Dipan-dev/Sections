<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotify</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav>
      <ul>
        <li class="brand">
          <img src="Assets/spotify.png" alt="Spotify logo" /> Spotify
        </li>
        <li>Home</li>
        <li>About</li>
      </ul>
    </nav>
    <div class="container">
      <div class="Song-list">
        <h1>Best of Ed Sheeran</h1>
        <div>
            <div class="song-item">
          <img src="Assets/cover.png" alt="1" />
          <span>Shape of You</span>
          <span class="songList-play"></span>
          <span>5:00 <i class="fa-solid fa-1x fa-circle-play"></i></span></i></span>
        </div>
      </div>
    </div>
      <div class="Song-banner"></div>
    </div>
    <section class="bottom">
      <div>
        <input type="range" name="range" id="my-progress-bar" min="0" max="100" />
      </div>
      <div class="icons">
        <!---fontawesome icons--->
        <i class="fa-solid fa-2x fa-step-backward"></i>
        <i class="fa-solid fa-2x fa-circle-play"></i>
        <i class="fa-solid fa-2x fa-step-forward"></i>
      </div>
      <script
        src="https://kit.fontawesome.com/a7d1867a8c.js"
        crossorigin="anonymous"
      ></script>
    </section>
  </body>
</html>
