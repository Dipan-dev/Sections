<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotify</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav>
      <ul>
        <li class="brand">
          <img src="Assets/spotify.png" alt="Spotify logo" /> Spotify
        </li>
        <li>Home</li>
        <li>About</li>
      </ul>
    </nav>
    <div class="container">
      <h1>Best of NCS-No copyrights</h1>
      <div class="Songlist"></div>
      <div class="SongBanner"></div>
    </div>
    <section class="bottom">
      <div>
        <input type="range" name="range" id="myProgressBar" min="0" max="100" />
      </div>
      <div class="icons">
        <!---fontawesome icons--->
        <i class="fa-solid fa-2x fa-step-backward"></i>
        <i class="fa-solid fa-2x fa-circle-play"></i>
        <i class="fa-solid fa-2x fa-step-forward"></i>
      </div>
    </section>
    <section class="community-section">
      <div class="community-content">
        <h1>Visit our Community</h1>

        <p>
          Have questions? Find answers from our worldwide Community of expert
          fans!
        </p>

        <button id="communityBtn">Go to Community</button>
      </div>
    </section>
    <section>
      <div></div>
    </section>
    <script src="https://kit.fontawesome.com/a7d1867a8c.js" crossorigin="anonymous"></script>
    <script src="script.js"></script>
  </body>
</html>
